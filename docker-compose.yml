services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: skooly
      POSTGRES_PASSWORD: skooly
      POSTGRES_DB: skooly_dev
    ports:
      - "5432:5432"
    volumes:
      - skooly_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skooly -d skooly_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - skooly_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      SECRET_KEY: ${SECRET_KEY:-docker-dev-secret-change-me-please-32bytes}
      JWT_SECRET: ${JWT_SECRET:-docker-dev-jwt-secret-change-me-please-32}
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,api,0.0.0.0"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:8080,http://localhost:3000,http://localhost:3001"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: skooly_dev
      DB_USER: skooly
      DB_PASSWORD: skooly
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      WHATSAPP_PROVIDER: mock
      SKOOLY_SEED_DEMO: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  skooly_pg:
  skooly_redis:
